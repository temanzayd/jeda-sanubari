<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari v0.1 Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l3 10 10 3-10 3-3 10-3-10-10-3 10-3 3-10z' fill='%2310b981' fill-opacity='0.03'/%3E%3C/svg%3E");
            min-height: 100vh; color: #0f172a;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.98); border-radius: 2.5rem; 
            box-shadow: 0 25px 50px -12px rgba(5, 150, 105, 0.08); 
            position: relative; border: 1px solid rgba(255,255,255,0.7);
            overflow: hidden;
        }
        /* Ornamen Islami Geometris */
        .glass-card::before {
            content: ""; position: absolute; top: -30px; right: -30px; width: 120px; height: 120px;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z' fill='%2310b981' fill-opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .arabic-font { font-family: 'Amiri', serif; direction: rtl; line-height: 2.2; font-size: 2.4rem; color: #064e3b; text-align: center; }
        .btn-action { background: #064e3b; color: white; padding: 14px 20px; border-radius: 14px; font-size: 0.75rem; font-weight: 800; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; width: 100%; border: 1px solid rgba(255,255,255,0.1); }
        .btn-yt { background: #ef4444; border: none; margin-top: 10px; }
        .btn-action:hover { transform: translateY(-2px); box-shadow: 0 10px 20px -5px rgba(0,0,0,0.1); }
        .btn-main { background: #0f172a; color: white; padding: 20px 40px; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.75rem; transition: 0.3s; }
        .btn-main:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <header class="text-center mb-16">
        <div class="inline-block px-4 py-1 mb-6 border border-slate-200 rounded-full bg-white/80 text-[8px] font-black text-slate-500 uppercase tracking-[0.4em]">
            Private Beta v0.1 | The Sanad Lock
        </div>
        <h1 class="text-4xl font-extrabold tracking-tighter italic mb-1 text-slate-900">Jeda<span class="text-emerald-600 font-normal">Sanubari</span></h1>
        <p class="text-[10px] uppercase tracking-[0.5em] text-slate-400 font-bold italic">Created by <b>RRD</b></p>
    </header>

    <div class="w-full max-w-xl glass-card p-10 mb-12">
        <div class="flex justify-between items-center mb-6 border-b border-slate-50 pb-4">
            <span class="text-[9px] font-black text-emerald-800 uppercase tracking-widest">Ruang Kontemplasi</span>
            <span id="wordCounter" class="text-[9px] font-bold text-slate-400">0 / 10 Kata</span>
        </div>
        <textarea id="userInput" oninput="validateInput()" placeholder="Bicaralah pada hatimu, sampaikan pada Tuhanmu..." 
            class="w-full bg-transparent focus:outline-none text-xl h-40 resize-none italic placeholder:text-slate-200 leading-relaxed"></textarea>
        <div class="flex justify-center pt-8 border-t border-slate-50">
            <button onclick="pancarHikmah()" id="sendBtn" disabled class="btn-main shadow-2xl">Jemput Hikmah ↗</button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden space-y-8 pb-32">
        <div id="aiContent"></div>
    </div>

    <script>
        const GROQ_KEY = "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"; 

        function validateInput() {
            const val = document.getElementById('userInput').value.trim();
            const words = val === "" ? 0 : val.split(/\s+/).length;
            document.getElementById('wordCounter').innerText = `${words} / 10 Kata`;
            document.getElementById('sendBtn').disabled = words < 10;
        }

        async function getQuranData(s, a) {
            try {
                const arab = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?verse_key=${s}:${a}`).then(r => r.json());
                const indo = await fetch(`https://api.quran.com/api/v4/verses/by_key/${s}:${a}?translations=33&fields=text_uthmani`).then(r => r.json());
                return { arab: arab.verses[0].text_uthmani, indo: indo.verse.translations[0].text.replace(/<[^>]*>?/gm, '') };
            } catch (e) { return null; }
        }

        async function pancarHikmah() {
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('aiContent');

            btn.disabled = true;
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="glass-card p-20 text-center text-slate-400 italic animate-pulse">Menyelaraskan Sanad Hikmah...</div>`;

            const systemPrompt = `INPUT: "${input}". TUGAS: Cari 1 Ayat & 1 Hadits sinkron.
            RULE: Jangan berikan teks Arab Quran (sistem akan ambil via API). 
            Berikan summary singkat yang syahdu di awal.
            JSON: {
                "summary": "Nasehat pembuka yang syahdu dan menenangkan batin",
                "tema": "...",
                "quran": { "s": "no", "a": "no", "name": "...", "tafsir": "..." },
                "hadits": { "perawi": "muslim/bukhari/...", "no": "nomor", "pesan": "..." },
                "asatidz": "Adi Hidayat/Salim A. Fillah/Hanan Attaki",
                "kutipan": "...",
                "yt_query": "kata kunci cari di youtube"
            }`;

            try {
                const groqReq = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: systemPrompt }], temperature: 0, response_format: { "type": "json_object" } })
                });

                const groqJson = await groqReq.json();
                const res = JSON.parse(groqJson.choices[0].message.content);
                const qData = await getQuranData(res.quran.s, res.quran.a);

                const haditsLink = `https://www.hadits.id/hadits/${res.hadits.perawi.toLowerCase()}/${res.hadits.no}`;
                const ytLink = `https://www.youtube.com/results?search_query=${encodeURIComponent(res.asatidz + ' ' + res.yt_query)}`;

                content.innerHTML = `
                    <div class="glass-card p-10 mb-8 bg-emerald-950 text-white border-none text-center">
                         <p class="text-[10px] font-black uppercase tracking-[0.4em] text-emerald-400 mb-4">Intisari Jeda</p>
                         <p class="text-xl italic font-medium leading-relaxed">"${res.summary}"</p>
                    </div>

                    <div class="text-center mb-10"><span class="px-6 py-2 border-2 border-emerald-100 text-emerald-800 text-[10px] font-black uppercase tracking-[0.3em] rounded-full bg-white shadow-sm italic">Tema: ${res.tema}</span></div>
                    
                    <div class="glass-card p-10 mb-8 border border-white">
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest block mb-6 text-center tracking-[0.2em]">Al-Qur'an (Live Quran.com)</span>
                        <p class="arabic-font mb-8">${qData ? qData.arab : "Memuat..."}</p>
                        <p class="text-center text-emerald-600 font-bold mb-4 uppercase text-[10px] tracking-widest">${res.quran.name} [${res.quran.s}:${res.quran.a}]</p>
                        <p class="text-slate-700 leading-relaxed text-center font-medium italic mb-10 px-4">"${qData ? qData.indo : "..."}"</p>
                        
                        <div class="bg-slate-50 p-6 rounded-3xl border-l-4 border-emerald-500 text-left mb-8 shadow-inner">
                            <p class="text-[9px] font-black uppercase text-emerald-700 mb-2 tracking-widest">Tadabbur Ayat:</p>
                            <p class="text-xs text-slate-600 leading-relaxed italic">${res.quran.tafsir}</p>
                        </div>
                        <a href="https://quran.com/${res.quran.s}:${res.quran.a}" target="_blank" class="btn-action">📖 Kroscek Tafsir Lengkap ↗</a>
                    </div>
                    
                    <div class="glass-card p-10 mb-8 text-center">
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest block mb-6 tracking-[0.2em]">As-Sunnah (Rujukan Hadits.id)</span>
                        <h2 class="text-2xl font-extrabold text-slate-900 mb-2 uppercase italic">HR. ${res.hadits.perawi}</h2>
                        <p class="text-emerald-600 font-bold mb-6 uppercase text-[10px] tracking-widest">Nomor: ${res.hadits.no}</p>
                        <p class="text-slate-700 leading-relaxed font-medium italic px-6 mb-10">"${res.hadits.pesan}"</p>
                        <a href="${haditsLink}" target="_blank" class="btn-action">📜 Verifikasi di Hadits.id ↗</a>
                    </div>

                    <div class="glass-card p-12 bg-slate-900 text-white border-none shadow-2xl">
                        <div class="flex items-center gap-6 mb-8 text-left">
                            <div class="w-14 h-14 rounded-2xl bg-emerald-900 flex items-center justify-center font-black text-xl text-white shadow-lg">
                                ${res.asatidz.split(' ').map(n=>n[0]).join('')}
                            </div>
                            <div>
                                <p class="text-[9px] uppercase tracking-widest font-bold text-slate-500 mb-1 italic">Nasehat Asatidz</p>
                                <h3 class="text-2xl font-extrabold tracking-tight italic uppercase">Ustadz ${res.asatidz}</h3>
                            </div>
                        </div>
                        <p class="text-xl italic font-medium text-slate-300 leading-relaxed mb-10 text-left">"${res.kutipan}"</p>
                        <a href="${ytLink}" target="_blank" class="btn-action btn-yt">▶ Tonton Penjelasan di YouTube</a>
                    </div>
                    
                    <footer class="text-center pt-16 border-t border-slate-200/50">
                        <p class="text-[0.65rem] text-slate-400 tracking-[0.8em] font-extrabold mb-3 italic uppercase">Created by <b>RRD</b></p>
                    </footer>
                `;
            } catch (err) {
                content.innerHTML = `<div class="glass-card p-10 text-red-500 text-center text-sm font-bold uppercase tracking-widest">Sanad Terputus. Mohon Coba Lagi.</div>`;
            } finally {
                btn.disabled = false; btn.innerText = "Jemput Hikmah ↗"; validateInput();
            }
        }
    </script>
</body>
</html>

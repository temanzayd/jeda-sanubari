<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari v0.1 Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l2.5 7.5L40 10l-7.5 2.5L30 20l-2.5-7.5L20 10l7.5-2.5L30 0z' fill='%2310b981' fill-opacity='0.03'/%3E%3C/svg%3E");
            min-height: 100vh; color: #0f172a;
        }
        .glass-card { background: rgba(255, 255, 255, 0.98); border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(5, 150, 105, 0.08); position: relative; }
        .btn-verify { background: #064e3b; color: white; padding: 14px 28px; border-radius: 14px; font-size: 0.75rem; font-weight: 800; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; width: 100%; justify-content: center; }
        .btn-verify:hover { background: #059669; transform: translateY(-2px); }
        .btn-main { background: #0f172a; color: white; padding: 20px 40px; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.75rem; }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <header class="text-center mb-16">
        <div class="inline-block px-4 py-1 mb-6 border border-slate-200 rounded-full bg-white text-[8px] font-black text-slate-500 uppercase tracking-[0.4em]">
            Private Beta v0.1 | Safety First Edition
        </div>
        <h1 class="text-4xl font-extrabold tracking-tighter italic mb-1 text-slate-900">Jeda<span class="text-emerald-600 font-normal">Sanubari</span></h1>
        <p class="text-[10px] uppercase tracking-[0.5em] text-slate-400 font-bold italic text-center">Created by <b>RRD</b></p>
    </header>

    <div class="w-full max-w-xl glass-card p-10 mb-12 border border-white">
        <textarea id="userInput" oninput="validateInput()" placeholder="Apa yang sedang mengusik ketenangan Bapak? (min. 10 kata)..." 
            class="w-full bg-transparent focus:outline-none text-xl h-40 resize-none italic placeholder:text-slate-200 leading-relaxed"></textarea>
        <div class="flex justify-between items-center mt-6 pt-6 border-t border-slate-100">
            <span id="wordCounter" class="text-[9px] font-bold text-slate-400 uppercase">0 / 10 Kata</span>
            <button onclick="pancarHikmah()" id="sendBtn" disabled class="btn-main shadow-xl">Jemput Hikmah ↗</button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden space-y-8 pb-32">
        <div id="aiContent"></div>
    </div>

    <script>
        const GROQ_KEY = "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"; 

        function validateInput() {
            const val = document.getElementById('userInput').value.trim();
            const words = val === "" ? 0 : val.split(/\s+/).length;
            document.getElementById('wordCounter').innerText = `${words} / 10 Kata`;
            document.getElementById('sendBtn').disabled = words < 10;
        }

        async function pancarHikmah() {
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('aiContent');

            btn.disabled = true;
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="glass-card p-20 text-center text-slate-400 italic animate-pulse">Menyelaraskan rujukan otoritatif...</div>`;

            // STRATEGI: AI dilarang menulis teks ayat/hadits. 
            // AI hanya memberikan "Kata Kunci Pencarian" untuk divalidasi manual.
            const systemPrompt = `INPUT: "${input}". TUGAS: Cari 1 Ayat & 1 Hadits sinkron.
            PERATURAN: Jangan tulis teks Arab atau Terjemahan karena sering salah. 
            Berikan KATA KUNCI yang akurat untuk dicari di database eksternal.
            JSON: {
                "tema": "...",
                "quran": { "keyword": "Nama Surah Ayat X", "search_slug": "surah_no/ayat_no" },
                "hadits": { "perawi": "...", "keyword": "3-5 kata kunci hadits bahasa Indonesia" },
                "asatidz": "Adi Hidayat/Salim A. Fillah/Hanan Attaki",
                "tadabbur": "Nasehat bijak terkait masalah user",
                "kesimpulan": "Intisari hikmah"
            }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: systemPrompt }], temperature: 0, response_format: { "type": "json_object" } })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                content.innerHTML = `
                    <div class="text-center mb-10"><span class="px-6 py-2 border-2 border-emerald-100 text-emerald-800 text-[10px] font-black uppercase tracking-[0.3em] rounded-full bg-white shadow-sm italic">Tema: ${res.tema}</span></div>
                    
                    <div class="glass-card p-10 mb-8 border border-white text-center">
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest block mb-4">Rujukan Al-Qur'an</span>
                        <h2 class="text-2xl font-extrabold text-slate-900 mb-8">${res.quran.keyword}</h2>
                        <a href="https://quran.com/${res.quran.search_slug}?locale=id" target="_blank" class="btn-verify">📖 Baca Ayat & Tafsir di Quran.com ↗</a>
                    </div>
                    
                    <div class="glass-card p-10 mb-8 border border-white text-center">
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest block mb-4">Rujukan Hadits Shahih</span>
                        <h2 class="text-2xl font-extrabold text-slate-900 mb-8">Shahih ${res.hadits.perawi}</h2>
                        <p class="text-slate-500 text-sm mb-8 italic">Keyword: "${res.hadits.keyword}"</p>
                        <a href="https://hadits.tazkia.ac.id/search/hadits?q=${encodeURIComponent(res.hadits.perawi + ' ' + res.hadits.keyword)}" target="_blank" class="btn-verify">📜 Verifikasi di Database Tazkia ↗</a>
                    </div>

                    <div class="glass-card p-12 bg-slate-900 text-white border-none shadow-2xl">
                        <div class="flex items-center gap-6 mb-8">
                            <div class="w-14 h-14 rounded-2xl bg-emerald-900 border border-white/10 flex items-center justify-center font-black text-xl text-white">${res.asatidz.split(' ').map(n=>n[0]).join('')}</div>
                            <div>
                                <p class="text-[9px] uppercase tracking-widest font-bold text-slate-500 mb-1">Dawuh Asatidz</p>
                                <h3 class="text-2xl font-extrabold tracking-tight italic">Ustadz ${res.asatidz}</h3>
                            </div>
                        </div>
                        <p class="text-xl italic font-medium text-slate-300 leading-relaxed mb-8">"${res.tadabbur}"</p>
                        <div class="p-6 bg-white/5 rounded-2xl border-l-4 border-emerald-500 italic text-sm text-slate-200">${res.kesimpulan}</div>
                    </div>
                    
                    <footer class="text-center pt-12 border-t border-slate-200/50">
                        <p class="text-[0.65rem] text-slate-400 tracking-[0.6em] font-extrabold mb-3 italic">Created by <b>RRD</b></p>
                    </footer>
                `;
            } catch (err) {
                content.innerHTML = `<div class="glass-card p-10 text-red-500 text-center text-sm font-bold uppercase tracking-widest">Gagal Menghubungkan Hikmah. Coba Lagi.</div>`;
            } finally {
                btn.disabled = false; btn.innerText = "Jemput Hikmah ↗"; validateInput();
            }
        }
    </script>
</body>
</html>

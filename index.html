<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari v0.1 Platinum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfcfc; min-height: 100vh; color: #0f172a; }
        .glass-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; overflow: hidden; }
        .arabic-font { font-family: 'Amiri', serif; direction: rtl; line-height: 2.2; font-size: 2.2rem; color: #064e3b; text-align: center; }
        .btn-main { background: #0f172a; color: white; padding: 18px 36px; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.7rem; transition: 0.3s; }
        .btn-main:disabled { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <header class="text-center mb-16">
        <h1 class="text-3xl font-extrabold italic text-slate-900 text-center w-full">Jeda<span class="text-emerald-600 font-normal">Sanubari</span></h1>
        <p class="text-[9px] uppercase tracking-[0.5em] text-slate-400 font-bold mt-2 text-center w-full">v0.1 Platinum | Compatibility Mode</p>
    </header>

    <div class="w-full max-w-xl glass-card p-10 mb-12">
        <textarea id="userInput" oninput="validate()" placeholder="Tumpahkan keluh kesah Anda (min. 10 kata)..." class="w-full bg-transparent focus:outline-none text-lg h-40 resize-none italic leading-relaxed"></textarea>
        <div class="flex justify-center pt-8 border-t border-slate-50">
            <button onclick="pancar()" id="sendBtn" disabled class="btn-main shadow-2xl">Jemput Hikmah ↗</button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden space-y-10 pb-32">
        <div id="aiContent"></div>
    </div>

    <script>
        const API_KEY = "AIzaSyDo2YUNhjKT2ZtyjYXEjPu0JLN1QIy-4FE"; 

        function validate() {
            const val = document.getElementById('userInput').value.trim();
            document.getElementById('sendBtn').disabled = val.split(/\s+/).length < 10;
        }

        async function getQuran(s, a) {
            try {
                const arab = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?verse_key=${s}:${a}`).then(r => r.json());
                const indo = await fetch(`https://api.quran.com/api/v4/verses/by_key/${s}:${a}?translations=33`).then(r => r.json());
                return { a: arab.verses[0].text_uthmani, i: indo.verse.translations[0].text.replace(/<[^>]*>?/gm, '') };
            } catch (e) { return null; }
        }

        async function pancar() {
            const input = document.getElementById('userInput').value;
            const content = document.getElementById('aiContent');
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="p-12 text-center italic text-slate-400 animate-pulse text-[10px] uppercase tracking-widest text-center w-full">Sinkronisasi Hikmah...</div>`;

            // MENGGUNAKAN MODEL gemini-1.5-flash-latest (Lebih kompatibel di v1beta)
            const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

            const payload = {
                contents: [{ parts: [{ text: `INPUT: "${input}". BERIKAN NASIHAT ISLAMI. OUTPUT JSON: {"summary":"...","quran":{"s":"no","a":"no","name":"...","alasan":"..."},"sirah":{"tokoh":"...","judul":"...","narasi":"...","keyword":"..."},"asatidz":"...","kutipan":"...","yt_query":"..."}` }] }],
                generationConfig: { 
                    response_mime_type: "application/json",
                    temperature: 0.7
                }
            };

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : 'Unknown API Error');
                }

                const rawText = data.candidates[0].content.parts[0].text.trim();
                const res = JSON.parse(rawText);
                const q = await getQuran(res.quran.s, res.quran.a);

                content.innerHTML = `
                    <div class="glass-card p-10 bg-slate-900 text-white text-center shadow-xl">
                        <p class="text-xl italic font-medium leading-relaxed">"${res.summary}"</p>
                    </div>
                    <div class="glass-card p-10 border-slate-100">
                        <p class="arabic-font mb-10 text-center w-full">${q ? q.a : "..."}</p>
                        <p class="text-center text-emerald-600 font-bold mb-4 uppercase text-[10px] tracking-widest text-center w-full">${res.quran.name} [${res.quran.s}:${res.quran.a}]</p>
                        <p class="text-slate-700 text-center italic px-4 leading-relaxed text-center w-full">"${q ? q.i : "..."}"</p>
                        <div class="mt-8 bg-emerald-50 p-6 rounded-2xl text-xs italic text-slate-600 border-l-4 border-emerald-500">${res.quran.alasan}</div>
                    </div>
                    <div class="glass-card p-10 bg-white">
                        <h3 class="font-black uppercase text-[10px] text-slate-400 mb-4 tracking-widest text-center w-full">Dawuh Ustadz ${res.asatidz}</h3>
                        <p class="text-xl italic font-serif text-slate-700 mb-8 leading-relaxed text-center w-full">"${res.kutipan}"</p>
                        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent(res.asatidz + ' ' + res.yt_query)}" target="_blank" class="block text-center bg-red-600 text-white py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-lg">Simak di YouTube</a>
                    </div>
                    <footer class="text-center pt-10 uppercase text-[0.7rem] text-slate-300 tracking-[0.8em] font-black italic text-center w-full">Created by <b>RRD</b></footer>
                `;
            } catch (err) {
                content.innerHTML = `<div class="p-8 bg-red-50 border border-red-200 rounded-3xl">
                    <p class="text-red-800 font-bold uppercase text-[10px] mb-2 text-center w-full">Diagnostic Trace (Fix):</p>
                    <pre class="text-[9px] text-red-600 font-mono whitespace-pre-wrap">${err.message}</pre>
                </div>`;
            }
        }
    </script>
</body>
</html>

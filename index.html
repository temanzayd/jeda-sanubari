<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari v0.1 Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0l3 10 10 3-10 3-3 10-3-10-10-3 10-3 3-10z' fill='%2310b981' fill-opacity='0.03'/%3E%3C/svg%3E");
            min-height: 100vh; color: #0f172a;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(5, 150, 105, 0.08);
            position: relative; overflow: hidden;
        }
        .btn-ref {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 24px; border-radius: 14px;
            background: #ffffff; color: #064e3b;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
            transition: all 0.3s ease; border: 2px solid #ecfdf5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .btn-ref:hover { background: #ecfdf5; border-color: #10b981; transform: translateY(-2px); }
        .btn-main {
            background: #0f172a; color: white;
            padding: 20px 40px; border-radius: 20px;
            font-weight: 800; text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.75rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-main:hover { transform: scale(1.05); box-shadow: 0 20px 25px -5px rgba(15, 23, 42, 0.2); }
        .btn-main:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }
        .watermark-text { font-size: 0.65rem; color: #94a3b8; letter-spacing: 0.3em; font-weight: 800; }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <header class="text-center mb-16">
        <div class="inline-block px-4 py-1 mb-6 border border-slate-200 rounded-full bg-white/80 text-[8px] font-black text-slate-500 uppercase tracking-[0.4em] shadow-sm">
            Private Beta v0.1
        </div>
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tighter italic mb-1">Jeda<span class="text-emerald-600 font-normal">Sanubari</span></h1>
        <p class="text-[10px] uppercase tracking-[0.5em] text-slate-400 font-bold opacity-80">Teman Kontemplasi Digital</p>
    </header>

    <div class="w-full max-w-xl glass-card p-10 mb-12">
        <div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-6">
            <span class="text-[10px] font-black text-emerald-800 uppercase tracking-[0.2em]">Ruang Munajat</span>
            <span id="wordCounter" class="text-[9px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full border border-slate-100 transition-all">0 / 10 Kata</span>
        </div>
        <textarea id="userInput" oninput="validateInput()" placeholder="Tumpahkan apa yang mengusik ketenangan Bapak (min. 10 kata)..." 
            class="w-full bg-transparent focus:outline-none text-slate-700 text-xl h-40 resize-none italic placeholder:text-slate-200 leading-relaxed"></textarea>
        <div class="flex justify-center pt-8">
            <button onclick="pancarHikmah()" id="sendBtn" disabled class="btn-main active:scale-95 shadow-xl">
                Jemput Hikmah ↗
            </button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden space-y-8 pb-32">
        <div id="aiContent"></div>
        
        <footer class="text-center pt-12 border-t border-slate-200/50">
            <p class="watermark-text mb-3 tracking-[0.6em]">Created by <b>RRD</b></p>
            <p class="text-[8px] text-slate-400 px-12 leading-relaxed italic opacity-70 uppercase tracking-widest">
                Akurasi adalah amanah. <br> 
                Sistem ini merujuk langsung ke sumber otoritatif guna menghindari halusinasi teks.
            </p>
        </footer>
    </div>

    <script>
        const GROQ_KEY = "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"; 
        const asatidz = [
            { name: "Salim A. Fillah", img: "https://salimafillah.com/wp-content/uploads/2016/05/ust-salim.jpg" },
            { name: "Adi Hidayat", img: "https://www.biografiku.com/wp-content/uploads/2018/01/Biografi-Ustadz-Adi-Hidayat.jpg" },
            { name: "Hanan Attaki", img: "https://akcdn.detik.net.id/visual/2023/05/12/ustadz-hanan-attaki_169.jpeg" }
        ];

        function validateInput() {
            const text = document.getElementById('userInput').value.trim();
            const words = text === "" ? 0 : text.split(/\s+/).length;
            const btn = document.getElementById('sendBtn');
            const counter = document.getElementById('wordCounter');
            counter.innerText = `${words} / 10 Kata`;
            btn.disabled = words < 10;
            if(words >= 10) counter.className = "text-[9px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100";
            else counter.className = "text-[9px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full border border-slate-100";
        }

        async function pancarHikmah() {
            const input = document.getElementById('userInput').value;
            const selected = asatidz[Math.floor(Math.random() * asatidz.length)];
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('aiContent');

            btn.disabled = true;
            btn.innerText = "MENGHUBUNGKAN...";
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="glass-card p-20 text-center text-slate-400 italic animate-pulse text-sm">Menjemput rujukan dari sumber otoritatif...</div>`;

            const systemPrompt = `INPUT: "${input}". 
            TUGAS: Cari 1 Ayat & 1 Hadits yang sinkron.
            PENTING: Jangan tampilkan teks Arab. Cukup referensi akurat.
            JSON: {
                "tema": "Tema Hikmah",
                "quran": { "surah_no": "...", "ayat_no": "...", "surah_name": "...", "pesan": "Ringkasan isi ayat" },
                "hadits": { "perawi": "...", "hadits_no": "...", "pesan": "Ringkasan isi hadits" },
                "tadabbur": "Nasihat mendalam gaya ${selected.name}"
            }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: systemPrompt }], temperature: 0, response_format: { "type": "json_object" } })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                content.innerHTML = `
                    <div class="text-center mb-10"><span class="px-6 py-2 border-2 border-emerald-100 text-emerald-800 text-[10px] font-black uppercase tracking-[0.3em] rounded-full bg-white shadow-sm italic">Tema: ${res.tema}</span></div>
                    
                    <div class="glass-card p-10 mb-8">
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest block mb-6 text-center">Rujukan Al-Qur'an</span>
                        <h2 class="text-2xl font-extrabold text-center text-slate-900 mb-2">${res.quran.surah_name}</h2>
                        <p class="text-center text-emerald-600 font-bold mb-8 uppercase text-[10px] tracking-widest">Ayat ${res.quran.ayat_no}</p>
                        <p class="text-slate-700 leading-relaxed text-center italic mb-10 font-medium px-4">"${res.quran.pesan}"</p>
                        <div class="flex justify-center border-t border-slate-50 pt-8">
                            <a href="https://quran.com/${res.quran.surah_no}:${res.quran.ayat_no}" target="_blank" class="btn-ref">
                                📖 Buka di Quran.com ↗
                            </a>
                        </div>
                    </div>
                    
                    <div class="glass-card p-10 mb-8">
                        <span class="text-[9px] font-black text-slate-300 uppercase tracking-widest block mb-6 text-center">Rujukan Al-Hadits</span>
                        <h2 class="text-2xl font-extrabold text-center text-slate-900 mb-2">HR. ${res.hadits.perawi}</h2>
                        <p class="text-center text-emerald-600 font-bold mb-8 uppercase text-[10px] tracking-widest">Nomor ${res.hadits.hadits_no}</p>
                        <p class="text-slate-700 leading-relaxed text-center italic mb-10 font-medium px-4">"${res.hadits.pesan}"</p>
                        <div class="flex justify-center border-t border-slate-50 pt-8">
                            <a href="https://sunnah.com/search?q=${res.hadits.perawi}+${res.hadits.hadits_no}" target="_blank" class="btn-ref">
                                📜 Buka di Sunnah.com ↗
                            </a>
                        </div>
                    </div>
                    
                    <div class="glass-card p-12 bg-slate-900 text-white border-none shadow-2xl">
                        <div class="flex items-center gap-6 mb-8">
                            <img src="${selected.img}" class="w-16 h-16 rounded-2xl object-cover grayscale opacity-80 border-2 border-white/10 shadow-lg">
                            <div>
                                <p class="text-[9px] uppercase tracking-widest font-bold text-slate-500 mb-1">Dawuh Asatidz</p>
                                <h3 class="text-2xl font-extrabold tracking-tight">Ustadz ${selected.name}</h3>
                            </div>
                        </div>
                        <p class="text-xl italic font-medium text-slate-300 leading-relaxed">"${res.tadabbur}"</p>
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `<div class="glass-card p-10 text-slate-400 text-center text-sm">Transmisi terputus. Mohon jemput hikmah kembali.</div>`;
            } finally {
                btn.disabled = false; btn.innerText = "Jemput Hikmah ↗"; validateInput();
            }
        }
    </script>
</body>
</html>

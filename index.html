<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari v0.1 | Final Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfcfc; min-height: 100vh; color: #0f172a; }
        .glass-card { background: white; border-radius: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; overflow: hidden; }
        .arabic-font { font-family: 'Amiri', serif; direction: rtl; line-height: 2.2; font-size: 2.2rem; color: #064e3b; text-align: center; }
        .btn-main { background: #0f172a; color: white; padding: 18px 36px; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.7rem; transition: 0.3s; }
        .btn-main:disabled { background: #f1f5f9; color: #cbd5e1; cursor: not-allowed; }
        .gradient-border { border-left: 4px solid; border-image: linear-gradient(to bottom, #10b981, #064e3b) 1; }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <header class="text-center mb-16">
        <div class="inline-block px-4 py-1 mb-6 border border-slate-200 rounded-full bg-white/80 text-[8px] font-black text-slate-500 uppercase tracking-[0.4em]">v0.1 | Final Master Stable</div>
        <h1 class="text-3xl font-extrabold italic text-slate-900">Jeda<span class="text-emerald-600 font-normal">Sanubari</span></h1>
        <p class="text-[10px] uppercase tracking-[0.5em] text-slate-400 font-bold mt-2 text-center w-full">Created by <b>RRD</b></p>
    </header>

    <div class="w-full max-w-xl glass-card p-10 mb-12">
        <textarea id="userInput" oninput="validate()" placeholder="Tumpahkan keluh kesah Anda (min. 10 kata)..." class="w-full bg-transparent focus:outline-none text-lg h-40 resize-none italic leading-relaxed"></textarea>
        <div class="flex justify-center pt-8 border-t border-slate-50">
            <button onclick="pancarHikmah()" id="sendBtn" disabled class="btn-main shadow-2xl">Jemput Hikmah ↗</button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden space-y-10 pb-32">
        <div id="aiContent"></div>
    </div>

    <script>
        const API_KEY = "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"; 

        function validate() {
            const val = document.getElementById('userInput').value.trim();
            document.getElementById('sendBtn').disabled = val.split(/\s+/).length < 10;
        }

        async function getQuranData(s, a) {
            try {
                const arab = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?verse_key=${s}:${a}`).then(r => r.json());
                const indo = await fetch(`https://api.quran.com/api/v4/verses/by_key/${s}:${a}?translations=33`).then(r => r.json());
                return { a: arab.verses[0].text_uthmani, i: indo.verse.translations[0].text.replace(/<[^>]*>?/gm, '') };
            } catch (e) { return null; }
        }

        async function pancarHikmah() {
            const input = document.getElementById('userInput').value;
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('aiContent');
            
            btn.disabled = true;
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="p-12 text-center italic text-slate-400 animate-pulse text-[10px] tracking-widest uppercase w-full">Menyambungkan Sanad Hikmah...</div>`;

            const systemPrompt = `USER INPUT: "${input}". 
            TUGAS: Berikan nasihat islami yang mendalam.
            
            KONSTRUKSI SUMBER (WAJIB):
            1. "summary": WAJIB dimulai dengan "Terinspirasi dari pemikiran [Nama Ulama Klasik] dalam kitab [Nama Kitab]...". Ulama klasik harus dari kelompok: Imam Al-Ghazali, Ibnu Qayyim, Ibnu Atha'illah, atau Imam An-Nawawi.
            2. "sirah": Kisah nyata dari kehidupan Nabi SAW atau Sahabat.
            3. "asatidz": WAJIB pilih HANYA SATU dari: Adi Hidayat, Hanan Attaki, atau Salim A. Fillah. (TIDAK BOLEH tokoh klasik di sini).
            4. "kutipan": Nasehat khas ustadz kontemporer yang dipilih tersebut.

            WAJIB FORMAT JSON: {
                "summary": "Narasi hikmah klasik yang diawali rujukan ulama & kitab",
                "quran": { "s": "no", "a": "no", "name": "Surah Name", "alasan": "Kaitan ayat" },
                "sirah": { "tokoh": "...", "judul": "...", "narasi": "...", "deep_query": "Contoh: Kisah Umar bin Khattab saat..." },
                "asatidz": "Nama Ustadz Terpilih",
                "kutipan": "Nasehat ustadz tersebut...",
                "yt_query": "Topik spesifik untuk pencarian"
            }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${API_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: [{ role: "system", content: systemPrompt }], 
                        temperature: 0.1, 
                        response_format: { "type": "json_object" } 
                    })
                });

                if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);
                const q = await getQuranData(res.quran.s, res.quran.a);

                const finalVerifyLink = `https://www.google.com/search?q=${encodeURIComponent('sirah nabawiyah ' + res.sirah.deep_query + ' lengkap')}`;

                content.innerHTML = `
                    <div class="glass-card p-10 bg-slate-900 text-white text-center shadow-xl">
                        <p class="text-xl italic font-medium leading-relaxed">"${res.summary}"</p>
                    </div>

                    <div class="glass-card p-10 border-slate-100">
                        <p class="arabic-font mb-10 w-full text-center">${q ? q.a : "..."}</p>
                        <p class="text-center text-emerald-600 font-bold mb-4 uppercase text-[10px] tracking-widest w-full">${res.quran.name} [${res.quran.s}:${res.quran.a}]</p>
                        <p class="text-slate-700 text-center italic px-4 leading-relaxed w-full">"${q ? q.i : "..."}"</p>
                        <div class="mt-8 gradient-border bg-emerald-50/50 p-6 rounded-2xl text-xs italic text-slate-600">${res.quran.alasan}</div>
                    </div>

                    <div class="glass-card p-10 bg-white text-center">
                        <h2 class="text-2xl font-black italic text-slate-900 mb-2 uppercase text-center w-full">${res.sirah.judul}</h2>
                        <p class="text-emerald-600 font-bold mb-8 uppercase text-[10px] tracking-widest text-center w-full">Tokoh: ${res.sirah.tokoh}</p>
                        <p class="text-slate-700 leading-relaxed font-medium italic px-6 mb-10 border-l-2 border-slate-100 pl-6 text-left">"${res.sirah.narasi}"</p>
                        <a href="${finalVerifyLink}" target="_blank" class="block text-center bg-slate-100 text-slate-900 py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest border border-slate-200">Telusuri Referensi Kisah ↗</a>
                    </div>

                    <div class="glass-card p-12 bg-white shadow-xl border-slate-100 text-center">
                        <h3 class="font-black uppercase text-[10px] text-slate-400 mb-6 tracking-widest text-center w-full">Tausiyah Ustadz ${res.asatidz}</h3>
                        <p class="text-2xl italic font-serif text-slate-700 mb-10 leading-relaxed text-left">"${res.kutipan}"</p>
                        <a href="https://www.youtube.com/results?search_query=${encodeURIComponent('Ustadz ' + res.asatidz + ' ' + res.yt_query)}" target="_blank" class="block text-center bg-red-600 text-white py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-lg">Simak di YouTube</a>
                    </div>
                    
                    <footer class="text-center pt-10 uppercase text-[0.7rem] text-slate-300 tracking-[0.8em] font-black italic text-center w-full">Created by <b>RRD</b></footer>
                `;
            } catch (err) {
                content.innerHTML = `<div class="p-8 bg-red-50 text-red-600 text-[10px] font-mono border border-red-200 rounded-3xl text-center w-full">Gagal memuat Hikmah. Mohon coba lagi.</div>`;
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>

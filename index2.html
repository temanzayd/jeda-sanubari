<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SikoTadabbur v12.9 - Final Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #0f172a; -webkit-font-smoothing: antialiased; }
        .arabic-text { font-family: 'Amiri', serif; direction: rtl; text-align: right; line-height: 1.6; font-size: 2.2rem; font-weight: 700; color: #064e3b; margin: 1rem 0; }
        .card-final { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); overflow: hidden; margin-bottom: 1.5rem; padding: 2rem; }
        .label-soul { color: #059669; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; display: block; margin-bottom: 0.75rem; }
        #resultArea.show { display: block; animation: fadeInUp 0.6s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-12">

    <header class="text-center mb-10">
        <h1 class="text-3xl font-extrabold text-emerald-950 tracking-tighter italic">Siko<span class="text-emerald-600 font-normal">Tadabbur</span></h1>
        <p class="text-emerald-600/50 text-[10px] font-bold uppercase tracking-[0.3em] mt-2">v12.9 • Client-Side Rendering • Zero Layout Error</p>
    </header>

    <div class="w-full max-w-xl card-final">
        <label class="label-soul">Curahan Kalbu</label>
        <textarea id="userInput" placeholder="Tumpahkan bisikan hati Bapak di sini..." 
            class="w-full px-2 py-1 bg-transparent focus:outline-none text-slate-700 text-lg h-32 resize-none italic"></textarea>
        <div class="flex justify-center pt-6 border-t border-slate-100">
            <button onclick="executeFinal()" id="sendBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-12 py-4 rounded-2xl font-extrabold text-xs uppercase tracking-widest transition-all active:scale-95 shadow-lg">
                Jemput Hikmah
            </button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden">
        <div id="aiContent" class="pb-20"></div>
    </div>

    <script>
        const GROQ_KEY = "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"; 
        const asatidz = [
            { name: "Adi Hidayat", img: "https://www.biografiku.com/wp-content/uploads/2018/01/Biografi-Ustadz-Adi-Hidayat.jpg" },
            { name: "Salim A. Fillah", img: "https://salimafillah.com/wp-content/uploads/2016/05/ust-salim.jpg" },
            { name: "Hanan Attaki", img: "https://akcdn.detik.net.id/visual/2023/05/12/ustadz-hanan-attaki_169.jpeg" },
            { name: "Nouman Ali Khan", img: "https://bayyinah.com/wp-content/uploads/2019/04/NAK_new_circle.png" },
            { name: "Oemar Mita", img: "https://ui-avatars.com/api/?name=Oemar+Mita&background=059669&color=fff" }
        ];

        async function executeFinal() {
            const input = document.getElementById('userInput').value;
            if (!input) return;

            const selected = asatidz[Math.floor(Math.random() * asatidz.length)];
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('aiContent');

            btn.disabled = true;
            btn.innerText = "BERMUHASABAH...";
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="card-final text-center text-emerald-700 italic"><p class="animate-pulse">Menghubungkan sanad langit...</p></div>`;

            const systemPrompt = `
            ROLE: Pakar Tafsir & Sirah.
            TASK: Analisa mendalam siko: "${input}".
            
            Wajib berikan respon dalam format JSON murni (Strict JSON) agar sistem tidak berantakan:
            {
              "quran": {"arab": "...", "ref": "...", "indo": "...", "tafsir": "..."},
              "hadits": {"arab": "...", "rawi": "...", "no": "...", "indo": "...", "syarah": "..."},
              "sirah": {"kisah": "...", "tokoh": "..."},
              "tadabbur": "...",
              "keyword": "..."
            }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: systemPrompt }],
                        temperature: 0.1,
                        response_format: { "type": "json_object" }
                    })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                // CLIENT-SIDE RENDERING (The Hard-Fix)
                content.innerHTML = `
                    <div class="card-final">
                        <span class="label-soul">Kalamullah</span>
                        <p class="arabic-text">${res.quran.arab}</p>
                        <p class="text-sm font-bold text-slate-400 mb-4">${res.quran.ref}</p>
                        <p class="text-slate-700 leading-relaxed font-semibold">${res.quran.indo}</p>
                        <div class="p-6 bg-slate-50 rounded-2xl border-l-4 border-emerald-500 text-sm text-slate-500 italic mt-6">${res.quran.tafsir}</div>
                    </div>

                    <div class="card-final">
                        <span class="label-soul">Pesan Nabawi</span>
                        <p class="arabic-text">${res.hadits.arab}</p>
                        <p class="text-sm font-bold text-slate-400 mb-4">HR. ${res.hadits.rawi} (No. ${res.hadits.no})</p>
                        <p class="text-slate-700 leading-relaxed font-semibold">${res.hadits.indo}</p>
                        <div class="p-6 bg-slate-50 rounded-2xl border-l-4 border-emerald-500 text-sm text-slate-500 italic mt-6">${res.hadits.syarah}</div>
                    </div>

                    <div class="card-final">
                        <span class="label-soul">Jejak Salaf</span>
                        <p class="text-slate-700 leading-relaxed italic mb-4">"${res.sirah.kisah}"</p>
                        <a href="https://www.youtube.com/results?search_query=kisah+sirah+${res.sirah.tokoh.replace(/ /g, '+')}" target="_blank" class="inline-block text-[10px] font-bold text-emerald-600 uppercase border-b-2 border-emerald-100 pb-1">Dalami Kisah ${res.sirah.tokoh} ↗</a>
                    </div>

                    <div class="card-final bg-emerald-600 text-white shadow-2xl border-none">
                        <div class="flex items-center gap-4 mb-6">
                            <img src="${selected.img}" class="w-14 h-14 rounded-xl object-cover border-2 border-white/20" onerror="this.src='https://ui-avatars.com/api/?name=${selected.name.replace(' ', '+')}&background=047857&color=fff'">
                            <div>
                                <p class="text-[9px] uppercase tracking-widest font-bold text-emerald-200">Dawuh Asatidz</p>
                                <h3 class="text-xl font-extrabold">Ustadz ${selected.name}</h3>
                            </div>
                        </div>
                        <p class="text-lg italic font-medium text-emerald-50 mb-8 leading-relaxed">"${res.tadabbur}"</p>
                        <a href="https://www.youtube.com/results?search_query=kajian+ustadz+${selected.name.replace(/ /g, '+')}+${res.keyword.replace(/ /g, '+')}" target="_blank" class="block w-full text-center py-4 bg-white text-emerald-800 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-xl">Buka Gerbang Ilmu ↗</a>
                    </div>
                `;
                document.getElementById('resultArea').classList.add('show');
            } catch (err) {
                content.innerHTML = `<div class="p-10 card-final bg-red-50 text-red-700 text-center"><b>Sistem Gagal:</b> Silakan coba lagi.</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Jemput Hikmah";
            }
        }
    </script>
</body>
</html>

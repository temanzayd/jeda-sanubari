<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari - Refleksi Dalam Wahyu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #f0fdf4, #f8fafc);
            min-height: 100vh;
            color: #0f172a;
        }
        .glass-container { 
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(5, 150, 105, 0.1);
        }
        .arabic-text { 
            font-family: 'Amiri', serif; 
            direction: rtl; 
            line-height: 1.6; 
            font-size: 2.5rem; 
            font-weight: 700; 
            color: #064e3b; 
        }
        .btn-primary {
            background: linear-gradient(135deg, #059669 0%, #064e3b 100%);
            box-shadow: 0 10px 25px -5px rgba(5, 150, 105, 0.4);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 20px 35px -5px rgba(5, 150, 105, 0.5); }
        .label-gold { color: #854d0e; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3em; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeInUp 0.8s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-12 flex flex-col items-center">

    <header class="text-center mb-16 animate-fade">
        <h1 class="text-4xl font-extrabold text-emerald-950 tracking-tighter italic mb-2">Jeda<span class="text-emerald-600 font-normal">Sanubari</span></h1>
        <div class="h-1 w-16 bg-emerald-600 mx-auto rounded-full opacity-20"></div>
        <p class="text-[10px] uppercase tracking-[0.4em] text-emerald-600/60 mt-4 font-bold">Menepi sejenak dalam bimbingan langit</p>
    </header>

    <div class="w-full max-w-xl glass-container p-10 mb-12 animate-fade">
        <span class="label-gold block mb-6">Munajat Hati</span>
        <textarea id="userInput" placeholder="Tumpahkan apa yang mengusik ketenangan Bapak..." 
            class="w-full bg-transparent focus:outline-none text-slate-700 text-xl h-40 resize-none italic placeholder:text-slate-300 leading-relaxed"></textarea>
        <div class="flex justify-center pt-8 border-t border-slate-200/50">
            <button onclick="pancarHikmah()" id="sendBtn" class="btn-primary text-white px-16 py-5 rounded-full font-extrabold text-[11px] uppercase tracking-[0.25em] active:scale-95 shadow-2xl">
                Jemput Petunjuk
            </button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden space-y-10 pb-24">
        <div id="aiContent"></div>
    </div>

    <script>
        const GROQ_KEY = "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"; 
        const asatidz = [
            { name: "Adi Hidayat", img: "https://www.biografiku.com/wp-content/uploads/2018/01/Biografi-Ustadz-Adi-Hidayat.jpg" },
            { name: "Salim A. Fillah", img: "https://salimafillah.com/wp-content/uploads/2016/05/ust-salim.jpg" },
            { name: "Hanan Attaki", img: "https://akcdn.detik.net.id/visual/2023/05/12/ustadz-hanan-attaki_169.jpeg" },
            { name: "Nouman Ali Khan", img: "https://bayyinah.com/wp-content/uploads/2019/04/NAK_new_circle.png" },
            { name: "Oemar Mita", img: "https://ui-avatars.com/api/?name=Oemar+Mita&background=059669&color=fff" }
        ];

        async function pancarHikmah() {
            const input = document.getElementById('userInput').value;
            if (!input) return;

            const selected = asatidz[Math.floor(Math.random() * asatidz.length)];
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('aiContent');

            btn.disabled = true;
            btn.innerText = "BERMUHASABAH...";
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="glass-container p-20 text-center text-emerald-800 italic animate-pulse">Menyelami samudra dalil...</div>`;

            const systemPrompt = `Berikan respon JSON murni untuk curahan hati: "${input}". 
            Diksi harus syahdu & islami. JSON: { "quran": {"arab": "...", "ref": "...", "indo": "...", "tafsir": "..."}, "hadits": {"arab": "...", "rawi": "...", "no": "...", "indo": "...", "syarah": "..."}, "sirah": {"kisah": "...", "tokoh": "..."}, "tadabbur": "...", "keyword": "..." }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: systemPrompt }],
                        temperature: 0.1,
                        response_format: { "type": "json_object" }
                    })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                content.innerHTML = `
                    <div class="glass-container p-10 mb-8 animate-fade shadow-xl">
                        <span class="label-gold">Kalamullah</span>
                        <p class="arabic-text my-8">${res.quran.arab}</p>
                        <p class="text-xs font-bold text-emerald-700 mb-2 uppercase tracking-widest">${res.quran.ref}</p>
                        <p class="text-slate-800 leading-relaxed font-semibold text-lg mb-8">${res.quran.indo}</p>
                        <div class="p-8 bg-emerald-50/50 rounded-[2rem] border-l-4 border-emerald-500 text-sm text-slate-600 italic leading-relaxed shadow-inner">${res.quran.tafsir}</div>
                    </div>

                    <div class="glass-container p-10 mb-8 animate-fade shadow-xl" style="animation-delay: 0.2s">
                        <span class="label-gold">Pesan Nabawi</span>
                        <p class="arabic-text my-8">${res.hadits.arab}</p>
                        <p class="text-xs font-bold text-emerald-700 mb-2 uppercase tracking-widest">HR. ${res.hadits.rawi} (No. ${res.hadits.no})</p>
                        <p class="text-slate-800 leading-relaxed font-semibold text-lg mb-8">${res.hadits.indo}</p>
                        <div class="p-8 bg-emerald-50/50 rounded-[2rem] border-l-4 border-emerald-500 text-sm text-slate-600 italic leading-relaxed shadow-inner">${res.hadits.syarah}</div>
                    </div>

                    <div class="glass-container p-10 mb-8 animate-fade shadow-xl" style="animation-delay: 0.4s">
                        <span class="label-gold">Jejak Salaf</span>
                        <p class="text-slate-800 leading-relaxed italic text-lg mb-8">"${res.sirah.kisah}"</p>
                        <a href="https://www.youtube.com/results?search_query=kisah+sirah+${res.sirah.tokoh.replace(/ /g, '+')}" target="_blank" class="text-[10px] font-black text-emerald-700 uppercase border-b-2 border-emerald-200 pb-1 tracking-widest">Dalami Kisah ${res.sirah.tokoh} ↗</a>
                    </div>

                    <div class="glass-container p-12 bg-gradient-to-br from-emerald-700 to-emerald-950 text-white shadow-2xl border-none animate-fade" style="animation-delay: 0.6s">
                        <div class="flex items-center gap-6 mb-10">
                            <img src="${selected.img}" class="w-16 h-16 rounded-2xl object-cover border-2 border-white/20 shadow-lg" onerror="this.src='https://ui-avatars.com/api/?name=${selected.name.replace(' ', '+')}&background=059669&color=fff'">
                            <div>
                                <p class="text-[9px] uppercase tracking-[0.3em] font-bold text-emerald-200 mb-1">Dawuh Asatidz</p>
                                <h3 class="text-2xl font-extrabold leading-tight tracking-tight">Ustadz ${selected.name}</h3>
                            </div>
                        </div>
                        <p class="text-xl italic font-medium text-emerald-50 mb-12 leading-relaxed">"${res.tadabbur}"</p>
                        <a href="https://www.youtube.com/results?search_query=kajian+ustadz+${selected.name.replace(/ /g, '+')}+${res.keyword.replace(/ /g, '+')}" target="_blank" class="block w-full text-center py-5 bg-white text-emerald-900 rounded-[1.5rem] text-[11px] font-black uppercase tracking-[0.2em] hover:bg-emerald-50 transition-all shadow-xl">Buka Gerbang Ilmu ↗</a>
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `<div class="glass-container p-10 text-red-600 text-center">Terjadi kendala teknis. Mohon jemput petunjuk sekali lagi.</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Jemput Petunjuk";
            }
        }
    </script>
</body>
</html>

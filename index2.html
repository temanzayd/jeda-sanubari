<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari Debug Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="p-6 md:p-12 bg-slate-50 flex flex-col items-center font-['Plus+Jakarta+Sans']">

    <header class="text-center mb-10">
        <h1 class="text-2xl font-black italic">Jeda<span class="text-emerald-600">Sanubari</span></h1>
        <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Debug Mode Active</p>
    </header>

    <div class="w-full max-w-xl bg-white rounded-3xl p-8 shadow-sm border border-slate-200">
        <textarea id="userInput" placeholder="Tulis sesuatu untuk tes debug..." class="w-full h-32 bg-transparent focus:outline-none text-lg resize-none"></textarea>
        <button onclick="pancarDebug()" id="sendBtn" class="w-full mt-6 bg-slate-900 text-white py-4 rounded-2xl font-bold uppercase text-xs tracking-widest">Run Debug Trace ↗</button>
    </div>

    <div id="debugArea" class="w-full max-w-xl mt-8 hidden">
        <div class="bg-red-50 border border-red-200 rounded-2xl p-6">
            <h3 class="text-red-800 font-black text-xs uppercase mb-4 tracking-tighter">Diagnostic Trace:</h3>
            <pre id="errorMessage" class="text-[10px] text-red-600 font-mono whitespace-pre-wrap leading-relaxed"></pre>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl mt-8 hidden">
        <div id="successContent" class="bg-emerald-50 text-emerald-800 p-6 rounded-2xl text-xs font-mono"></div>
    </div>

    <script>
        async function pancarDebug() {
            const input = document.getElementById('userInput').value;
            const errorArea = document.getElementById('debugArea');
            const errorMessage = document.getElementById('errorMessage');
            const resultArea = document.getElementById('resultArea');
            const successContent = document.getElementById('successContent');

            // Reset view
            errorArea.classList.add('hidden');
            resultArea.classList.add('hidden');
            
            try {
                console.log("Starting fetch to /api/pancar...");
                
                const response = await fetch('/api/pancar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ input })
                });

                console.log("Status Response:", response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ERROR ${response.status}\nURL: ${response.url}\nResponse: ${errorText}`);
                }

                const data = await response.json();
                resultArea.classList.remove('hidden');
                successContent.innerText = "SUCCESS! Data received:\n" + JSON.stringify(data, null, 2);

            } catch (err) {
                console.error("Debug Trace Caught:", err);
                errorArea.classList.remove('hidden');
                
                // Print error super jelas di layar
                errorMessage.innerText = `[LOG TIME: ${new Date().toLocaleTimeString()}]\n` +
                                         `ERROR TYPE: ${err.name}\n` +
                                         `MESSAGE: ${err.message}\n\n` +
                                         `POSSIBLE CAUSES:\n` +
                                         `1. File /api/pancar.js belum di-deploy ke Vercel.\n` +
                                         `2. Terjadi CORS Block (Jika Bapak buka via file:// bukan via domain).\n` +
                                         `3. API Key Gemini salah atau expired.`;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari v15.1 - Intelligence Guard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: radial-gradient(circle at top right, #f0fdf4, #f8fafc);
            min-height: 100vh;
            color: #0f172a;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px -12px rgba(5, 150, 105, 0.1);
        }
        .arabic-text { font-family: 'Amiri', serif; direction: rtl; text-align: right; line-height: 1.6; font-size: 2.4rem; font-weight: 700; color: #064e3b; }
        .btn-action {
            background: linear-gradient(135deg, #059669 0%, #064e3b 100%);
            box-shadow: 0 10px 25px -5px rgba(5, 150, 105, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-action:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }
        .label-soul { color: #065f46; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.3em; display: block; margin-bottom: 0.5rem; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: slideUp 0.8s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-12 flex flex-col items-center">

    <header class="text-center mb-12 animate-up">
        <h1 class="text-3xl font-extrabold text-emerald-950 tracking-tighter italic mb-1">Jeda<span class="text-emerald-600 font-normal">Sanubari</span></h1>
        <p class="text-[9px] uppercase tracking-[0.4em] text-emerald-600/50 mt-3 font-bold text-center">Menepi sejenak dalam bimbingan langit</p>
    </header>

    <div class="w-full max-w-xl glass-card p-8 mb-10 animate-up">
        <div class="flex justify-between items-center mb-6">
            <span class="label-soul">Munajat Hati</span>
            <span id="wordCounter" class="text-[9px] font-bold text-slate-400 uppercase tracking-widest bg-slate-100 px-3 py-1 rounded-full">0 / 10 Kata</span>
        </div>
        
        <textarea id="userInput" oninput="validateInput()" placeholder="Tumpahkan bisikan hati Bapak (minimal 10 kata agar hikmah lebih presisi)..." 
            class="w-full bg-transparent focus:outline-none text-slate-700 text-lg h-32 resize-none italic placeholder:text-slate-300"></textarea>
        
        <div class="flex justify-center pt-6 border-t border-slate-100">
            <button onclick="pancarHikmah()" id="sendBtn" disabled class="btn-action text-white px-12 py-4 rounded-2xl font-extrabold text-[10px] uppercase tracking-widest active:scale-95 shadow-xl">
                Jemput Petunjuk
            </button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden space-y-6 pb-24">
        <div id="aiContent"></div>
    </div>

    <script>
        const GROQ_KEY = "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"; 
        const asatidz = [
            { name: "Adi Hidayat", img: "https://www.biografiku.com/wp-content/uploads/2018/01/Biografi-Ustadz-Adi-Hidayat.jpg" },
            { name: "Salim A. Fillah", img: "https://salimafillah.com/wp-content/uploads/2016/05/ust-salim.jpg" },
            { name: "Hanan Attaki", img: "https://akcdn.detik.net.id/visual/2023/05/12/ustadz-hanan-attaki_169.jpeg" },
            { name: "Nouman Ali Khan", img: "https://bayyinah.com/wp-content/uploads/2019/04/NAK_new_circle.png" },
            { name: "Oemar Mita", img: "https://ui-avatars.com/api/?name=Oemar+Mita&background=059669&color=fff" }
        ];

        function validateInput() {
            const text = document.getElementById('userInput').value.trim();
            const words = text === "" ? 0 : text.split(/\s+/).length;
            const counter = document.getElementById('wordCounter');
            const btn = document.getElementById('sendBtn');

            counter.innerText = `${words} / 10 Kata`;

            if (words >= 10) {
                btn.disabled = false;
                counter.classList.replace('text-slate-400', 'text-emerald-600');
                counter.classList.add('bg-emerald-50');
            } else {
                btn.disabled = true;
                counter.classList.replace('text-emerald-600', 'text-slate-400');
                counter.classList.remove('bg-emerald-50');
            }
        }

        async function pancarHikmah() {
            const input = document.getElementById('userInput').value;
            const selected = asatidz[Math.floor(Math.random() * asatidz.length)];
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('aiContent');

            btn.disabled = true;
            btn.innerText = "BERMUHASABAH...";
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="glass-card p-16 text-center text-emerald-800 italic animate-pulse">Menyelami samudra dalil...</div>`;

            const systemPrompt = `Berikan respon JSON murni untuk input: "${input}". 
            Format: { 
                "quran": {"arab": "...", "ref": "...", "indo": "...", "tafsir": "..."}, 
                "hadits": {"arab": "...", "rawi": "...", "no": "...", "indo": "...", "syarah": "..."}, 
                "sirah": {"kisah": "...", "tokoh": "..."}, 
                "tadabbur": "...", 
                "keyword": "..." 
            }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "system", content: systemPrompt }],
                        temperature: 0.1,
                        response_format: { "type": "json_object" }
                    })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                content.innerHTML = `
                    <div class="glass-card p-8 mb-6 animate-up shadow-lg">
                        <span class="label-soul">Kalamullah</span>
                        <p class="arabic-text my-4">${res.quran.arab}</p>
                        <p class="text-[10px] font-bold text-emerald-700 mb-2 uppercase">${res.quran.ref}</p>
                        <p class="text-slate-800 leading-relaxed font-semibold mb-6">${res.quran.indo}</p>
                        <div class="p-6 bg-emerald-50/50 rounded-2xl border-l-4 border-emerald-500 text-sm text-slate-600 italic leading-relaxed">${res.quran.tafsir}</div>
                    </div>

                    <div class="glass-card p-8 mb-6 animate-up shadow-lg">
                        <span class="label-soul">Pesan Nabawi</span>
                        <p class="arabic-text my-4">${res.hadits.arab}</p>
                        <p class="text-[10px] font-bold text-emerald-700 mb-2 uppercase">HR. ${res.hadits.rawi} (No. ${res.hadits.no})</p>
                        <p class="text-slate-800 leading-relaxed font-semibold mb-6">${res.hadits.indo}</p>
                        <div class="p-6 bg-emerald-50/50 rounded-2xl border-l-4 border-emerald-500 text-sm text-slate-600 italic leading-relaxed">${res.hadits.syarah}</div>
                    </div>

                    <div class="glass-card p-8 mb-6 animate-up shadow-lg">
                        <span class="label-soul">Jejak Salaf</span>
                        <p class="text-slate-800 leading-relaxed italic mb-6">"${res.sirah.kisah}"</p>
                        <a href="https://www.youtube.com/results?search_query=kisah+sirah+${res.sirah.tokoh.replace(/ /g, '+')}" target="_blank" class="text-[9px] font-black text-emerald-700 uppercase border-b-2 border-emerald-100 pb-1 tracking-widest">Dalami Kisah ${res.sirah.tokoh} ↗</a>
                    </div>

                    <div class="glass-card p-10 bg-gradient-to-br from-emerald-700 to-emerald-950 text-white shadow-2xl border-none animate-up">
                        <div class="flex items-center gap-4 mb-6">
                            <img src="${selected.img}" class="w-14 h-14 rounded-xl object-cover border-2 border-white/20 shadow-lg" onerror="this.src='https://ui-avatars.com/api/?name=${selected.name.replace(' ', '+')}&background=059669&color=fff'">
                            <div>
                                <p class="text-[8px] uppercase tracking-widest font-bold text-emerald-200 mb-1">Dawuh Asatidz</p>
                                <h3 class="text-xl font-extrabold leading-tight">Ustadz ${selected.name}</h3>
                            </div>
                        </div>
                        <p class="text-lg italic font-medium text-emerald-50 mb-8 leading-relaxed">"${res.tadabbur}"</p>
                        <a href="https://www.youtube.com/results?search_query=kajian+ustadz+${selected.name.replace(/ /g, '+')}+${res.keyword.replace(/ /g, '+')}" target="_blank" class="block w-full text-center py-4 bg-white text-emerald-900 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-emerald-50 transition-all shadow-xl">Buka Gerbang Ilmu ↗</a>
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `<div class="glass-card p-10 text-red-600 text-center">Mohon jemput petunjuk sekali lagi.</div>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Jemput Petunjuk";
                validateInput();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JedaSanubari v0.1 Beta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l2.5 7.5L40 10l-7.5 2.5L30 20l-2.5-7.5L20 10l7.5-2.5L30 0z' fill='%2310b981' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
            min-height: 100vh; color: #0f172a;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6); border-radius: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(5, 150, 105, 0.08);
            position: relative;
        }
        /* Ornamen Islami di Pojok */
        .glass-card::after {
            content: ""; position: absolute; top: 0; right: 0; width: 100px; height: 100px;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M100 0C80 0 60 20 60 40C60 60 80 80 100 80V0z' fill='%2310b981' fill-opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .arabic-text { 
            font-family: 'Amiri', serif; direction: rtl; line-height: 1.8; 
            font-size: 2.2rem; font-weight: 700; color: #064e3b; text-align: right;
        }
        .btn-beta {
            background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-beta:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(15, 23, 42, 0.3); }
        .btn-beta:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; box-shadow: none; }
        .watermark-text { font-size: 0.6rem; color: #94a3b8; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <header class="text-center mb-16">
        <div class="inline-block px-4 py-1 mb-4 border border-slate-200 rounded-full bg-white/50 text-[8px] font-black text-slate-500 uppercase tracking-[0.3em]">
            Private Beta v0.1
        </div>
        <h1 class="text-4xl font-extrabold text-slate-900 tracking-tighter italic mb-1">Jeda<span class="text-emerald-600 font-normal">Sanubari</span></h1>
        <p class="text-[10px] uppercase tracking-[0.4em] text-slate-400 font-bold opacity-80">Teman Kontemplasi Digital</p>
    </header>

    <div class="w-full max-w-xl glass-card p-10 mb-12">
        <div class="flex justify-between items-center mb-8 border-b border-slate-100 pb-6">
            <span class="text-[10px] font-black text-emerald-800 uppercase tracking-[0.2em]">Munajat Hati</span>
            <span id="wordCounter" class="text-[9px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">0 / 10 Kata</span>
        </div>
        <textarea id="userInput" oninput="validateInput()" placeholder="Tuliskan setidaknya 10 kata yang sedang mengusik ketenangan Bapak..." 
            class="w-full bg-transparent focus:outline-none text-slate-700 text-xl h-40 resize-none italic placeholder:text-slate-200 leading-relaxed"></textarea>
        <div class="flex justify-center pt-8">
            <button onclick="pancarHikmah()" id="sendBtn" disabled class="btn-beta text-white px-16 py-5 rounded-2xl font-black text-[10px] uppercase tracking-[0.3em] shadow-2xl">
                Jemput Hikmah ↗
            </button>
        </div>
    </div>

    <div id="resultArea" class="w-full max-w-xl hidden space-y-8 pb-32">
        <div id="aiContent"></div>
        
        <footer class="text-center space-y-4 pt-10 border-t border-slate-200/50">
            <p class="watermark-text tracking-[0.5em]">Developed by <b>temanzayd</b></p>
            <p class="text-[8px] text-slate-400 px-12 leading-relaxed italic opacity-70">
                Aplikasi ini bersifat eksperimental. Hasil AI adalah bahan renungan pribadi secara santai, <br> 
                bukan rujukan fiqih, fatwa, atau informasi hukum formal.
            </p>
        </footer>
    </div>

    <script>
        const GROQ_KEY = "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"; 
        const asatidz = [
            { name: "Salim A. Fillah", img: "https://salimafillah.com/wp-content/uploads/2016/05/ust-salim.jpg" },
            { name: "Adi Hidayat", img: "https://www.biografiku.com/wp-content/uploads/2018/01/Biografi-Ustadz-Adi-Hidayat.jpg" },
            { name: "Hanan Attaki", img: "https://akcdn.detik.net.id/visual/2023/05/12/ustadz-hanan-attaki_169.jpeg" }
        ];

        function validateInput() {
            const text = document.getElementById('userInput').value.trim();
            const words = text === "" ? 0 : text.split(/\s+/).length;
            const btn = document.getElementById('sendBtn');
            const counter = document.getElementById('wordCounter');
            counter.innerText = `${words} / 10 Kata`;
            btn.disabled = words < 10;
            if(words >= 10) counter.className = "text-[9px] font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100";
            else counter.className = "text-[9px] font-bold text-slate-400 bg-slate-50 px-3 py-1 rounded-full border border-slate-100";
        }

        async function pancarHikmah() {
            const input = document.getElementById('userInput').value;
            const selected = asatidz[Math.floor(Math.random() * asatidz.length)];
            const btn = document.getElementById('sendBtn');
            const content = document.getElementById('aiContent');

            btn.disabled = true;
            btn.innerText = "MENGANALISA...";
            document.getElementById('resultArea').classList.remove('hidden');
            content.innerHTML = `<div class="glass-card p-20 text-center text-slate-400 italic animate-pulse text-sm">Menyusun sanad hikmah...</div>`;

            const systemPrompt = `INPUT: "${input}". TUGAS: Cari 1 Ayat, 1 Hadits, & 1 Sirah dengan tema sinkron. AKURASI: Dilarang mengarang teks Arab. JSON: { "tema": "...", "quran": {"arab": "...", "ref": "...", "indo": "...", "tafsir": "..."}, "hadits": {"arab": "...", "rawi": "...", "no": "...", "indo": "...", "syarah": "..."}, "sirah": {"kisah": "...", "tokoh": "..."}, "tadabbur": "Gaya bicara ${selected.name} yang menghubungkan ayat, hadits, dan sirah", "keyword": "..." }`;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${GROQ_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "system", content: systemPrompt }], temperature: 0, response_format: { "type": "json_object" } })
                });

                const data = await response.json();
                const res = JSON.parse(data.choices[0].message.content);

                content.innerHTML = `
                    <div class="text-center mb-10 animate-fade"><span class="px-6 py-2 border-2 border-emerald-100 text-emerald-800 text-[10px] font-black uppercase tracking-[0.3em] rounded-full bg-white shadow-sm italic">Tema: ${res.tema}</span></div>
                    
                    <div class="glass-card p-10 mb-8"><span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Kalamullah (${res.quran.ref})</span><p class="arabic-text my-8">${res.quran.arab}</p><p class="text-slate-800 leading-relaxed font-bold text-center text-lg mb-8">${res.quran.indo}</p><div class="p-8 bg-slate-50 rounded-[2rem] text-sm text-slate-500 italic leading-relaxed border-l-4 border-emerald-500 shadow-inner">${res.quran.tafsir}</div></div>
                    
                    <div class="glass-card p-10 mb-8"><span class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Al-Hadits (${res.hadits.rawi}: ${res.hadits.no})</span><p class="arabic-text my-8">${res.hadits.arab}</p><p class="text-slate-800 leading-relaxed font-bold text-center text-lg mb-8">${res.hadits.indo}</p><div class="p-8 bg-slate-50 rounded-[2rem] text-sm text-slate-500 italic leading-relaxed border-l-4 border-emerald-500 shadow-inner">${res.hadits.syarah}</div></div>
                    
                    <div class="glass-card p-12 bg-slate-900 text-white border-none shadow-2xl overflow-hidden">
                        <div class="flex items-center gap-6 mb-8">
                            <img src="${selected.img}" class="w-16 h-16 rounded-2xl object-cover grayscale opacity-80 border-2 border-white/10" onerror="this.src='https://ui-avatars.com/api/?name=${selected.name.replace(' ', '+')}&background=1e293b&color=fff'">
                            <div>
                                <p class="text-[9px] uppercase tracking-widest font-bold text-slate-500 mb-1">Dawuh Asatidz</p>
                                <h3 class="text-2xl font-extrabold leading-tight tracking-tight">Ustadz ${selected.name}</h3>
                            </div>
                        </div>
                        <p class="text-xl italic font-medium text-slate-300 leading-relaxed mb-10">"${res.tadabbur}"</p>
                        <a href="https://www.youtube.com/results?search_query=kajian+ustadz+${selected.name.replace(/ /g, '+')}+${res.keyword.replace(/ /g, '+')}" target="_blank" class="block w-full py-5 border-2 border-white/10 text-white text-center rounded-2xl text-[10px] font-black uppercase tracking-[0.4em] hover:bg-white hover:text-slate-900 transition-all">Buka Gerbang Ilmu ↗</a>
                    </div>
                `;
            } catch (err) {
                content.innerHTML = `<div class="glass-card p-10 text-slate-400 text-center text-sm">Maaf, koneksi terputus. Mohon coba kembali.</div>`;
            } finally {
                btn.disabled = false; btn.innerText = "Jemput Hikmah ↗"; validateInput();
            }
        }
    </script>
</body>
</html>
